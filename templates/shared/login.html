<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maktronics — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-tap-highlight-color:transparent}

:root,[data-theme="dark"] {
  --bg:#0D0F14; --card:#1E2330; --card2:#13161E; --border:#2A2F3E;
  --accent:#FF6B2B; --text:#E8EBF4; --muted:#7A8099; --red:#FF5252;
  --input-bg:rgba(255,255,255,.04); --input-focus:rgba(255,107,43,.05);
  --orb1:rgba(255,107,43,.25); --orb2:rgba(74,158,255,.2);
}
[data-theme="light"] {
  --bg:#F0F2F8; --card:#FFFFFF; --card2:#ECEEF5; --border:#D8DBE8;
  --accent:#FF6B2B; --text:#1A1D2E; --muted:#7A7F99; --red:#DC2626;
  --input-bg:rgba(0,0,0,.03); --input-focus:rgba(255,107,43,.04);
  --orb1:rgba(255,107,43,.15); --orb2:rgba(74,158,255,.12);
}

body {
  background:var(--bg); color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh; min-height:100dvh;
  display:flex; align-items:center; justify-content:center;
  padding:20px; overflow-y:auto;
  transition:background .25s,color .25s;
}

.bg-grid {
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,107,43,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,107,43,.03) 1px,transparent 1px);
  background-size:40px 40px; z-index:0;
}
.orb{position:fixed;border-radius:50%;filter:blur(80px);z-index:0;transition:background .25s}
.orb1{width:400px;height:400px;background:var(--orb1);top:-100px;right:-100px}
.orb2{width:300px;height:300px;background:var(--orb2);bottom:-80px;left:-60px}

.theme-toggle {
  position:fixed; top:16px; right:16px; z-index:100;
  background:var(--card); border:1px solid var(--border); color:var(--text);
  padding:7px 12px; border-radius:8px; cursor:pointer;
  font-size:12px; font-family:'DM Sans',sans-serif;
  display:flex; align-items:center; gap:6px; font-weight:600; transition:all .2s;
}
.theme-toggle:hover{border-color:var(--accent)}

.login-wrap {
  position:relative; z-index:1;
  width:100%; max-width:400px;
}

/* Brand */
.brand{text-align:center;margin-bottom:28px}
.brand-icon{
  font-size:40px; margin-bottom:10px;
  display:inline-flex; align-items:center; justify-content:center;
  width:72px; height:72px;
  background:rgba(255,107,43,.1); border:1px solid rgba(255,107,43,.2); border-radius:18px;
}
.brand h1{
  font-family:'Syne',sans-serif; font-size:24px; font-weight:800;
  color:var(--accent); letter-spacing:2px; margin-top:10px;
}
.brand p{color:var(--muted);font-size:11px;margin-top:4px;letter-spacing:1.5px;text-transform:uppercase}

/* Card */
.login-card{
  background:var(--card); border:1px solid var(--border); border-radius:18px;
  padding:28px 24px;
  box-shadow:0 24px 48px rgba(0,0,0,.2);
  transition:background .25s,border-color .25s;
}
.login-card h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:24px}

/* Form */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.form-control{
  width:100%; background:var(--input-bg); border:1px solid var(--border); color:var(--text);
  padding:13px 16px; border-radius:10px; font-size:15px; font-family:'DM Sans',sans-serif; transition:all .2s;
}
.form-control:focus{outline:none;border-color:var(--accent);background:var(--input-focus);box-shadow:0 0 0 3px rgba(255,107,43,.1)}
.form-control::placeholder{color:var(--muted)}

.btn-login{
  width:100%; padding:14px; background:var(--accent); color:#fff;
  border:none; border-radius:10px; font-size:15px; font-weight:700;
  cursor:pointer; font-family:'Syne',sans-serif; letter-spacing:1px;
  transition:all .2s; margin-top:4px; touch-action:manipulation;
}
.btn-login:hover,.btn-login:active{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 20px rgba(255,107,43,.3)}

/* Flash */
.flash{padding:11px 14px;border-radius:8px;margin-bottom:18px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px}
.flash.error{background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.3);color:var(--red)}

/* Hints */
.hints{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.hints-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;font-weight:700}
.hint-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.hint-row:last-child{border-bottom:none}
.hint-role{font-size:12px;color:var(--text)}
.hint-creds{font-size:11px;color:var(--muted);font-family:monospace;background:var(--card2);padding:2px 8px;border-radius:4px;border:1px solid var(--border)}

/* Mobile */
@media(max-width:480px){
  body{align-items:flex-start;padding:16px}
  .login-wrap{margin-top:16px}
  .brand{margin-bottom:20px}
  .brand-icon{width:60px;height:60px;font-size:32px}
  .brand h1{font-size:20px}
  .login-card{padding:20px 16px}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<button class="theme-toggle" onclick="toggleTheme()">
  <span id="t-icon">☀️</span>
  <span id="t-label">Light</span>
</button>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <h1>MAKTRONICS</h1>
    <p>Repair Management System</p>
  </div>

  <div class="login-card">
    <h2>Welcome back</h2>
    <p class="login-sub">Sign in to access your dashboard</p>

    {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="flash {{ cat }}">❌ {{ msg }}</div>
    {% endfor %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">SIGN IN →</button>
    </form>

    <div class="hints">
      <div class="hints-title">Demo Credentials</div>
      <div class="hint-row">
        <span class="hint-role">🔑 Admin</span>
        <span class="hint-creds">admin / admin123</span>
      </div>
      <div class="hint-row">
        <span class="hint-role">🔧 Technician 1</span>
        <span class="hint-creds">tech1 / tech123</span>
      </div>
      <div class="hint-row">
        <span class="hint-role">🔧 Technician 2</span>
        <span class="hint-creds">tech2 / tech456</span>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const t = localStorage.getItem('mak_theme') || 'dark';
  applyTheme(t);
})();
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme',theme);
  localStorage.setItem('mak_theme',theme);
  document.getElementById('t-icon').textContent = theme==='dark'?'☀️':'🌙';
  document.getElementById('t-label').textContent = theme==='dark'?'Light':'Dark';
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme')||'dark';
  applyTheme(cur==='dark'?'light':'dark');
}
</script>
</body>
</html>
