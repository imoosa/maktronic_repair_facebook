<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Link Error – Maktronics</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 440px; width: 100%;
      padding: 40px 32px;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h2 { font-size: 1.5rem; color: #c62828; margin-bottom: 12px; }
    .msg { color: #555; font-size: 0.95rem; line-height: 1.6; margin-bottom: 28px; }
    .contact-box {
      background: #fff3e0;
      border: 1px solid #ffe0b2;
      border-radius: 10px;
      padding: 16px;
      font-size: 0.9rem;
      color: #e65100;
    }
    .contact-box strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">⚠️</div>
  <h2>Payment Link Error</h2>
  <p class="msg">{{ message }}</p>
  <div class="contact-box">
    <strong>📞 Need help?</strong>
    Contact Maktronics and they will send you a fresh payment link.
  </div>
</div>
</body>
</html>
